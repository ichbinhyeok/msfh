name: Deploy ScopeVerdict to OCI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: scopeverdict-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: ./mvnw -B test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            shinhyeok22/scopeverdict:latest
            shinhyeok22/scopeverdict:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload deploy assets to OCI
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          source: "docker-compose.yml"
          target: "~/deploy/scopeverdict/release"
          overwrite: true

      - name: Deploy on OCI host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          script: |
            set -euo pipefail

            APP_DIR="$HOME/deploy/scopeverdict"
            RELEASE_DIR="$APP_DIR/release"

            mkdir -p "$APP_DIR/storage/leads"
            cp "$RELEASE_DIR/docker-compose.yml" "$APP_DIR/docker-compose.yml"

            cat > "$APP_DIR/.env" <<EOF
            IMAGE_NAME=shinhyeok22/scopeverdict:latest
            HOST_PORT=8098
            APP_BASE_URL=https://scopeverdict.com
            APP_ADMIN_USERNAME=${{ secrets.APP_ADMIN_USERNAME }}
            APP_ADMIN_PASSWORD=${{ secrets.APP_ADMIN_PASSWORD }}
            JAVA_OPTS=-XX:+UseG1GC -Xms256m -Xmx384m -Xss512k -Djava.security.egd=file:/dev/./urandom
            EOF

            cd "$APP_DIR"
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps

            for attempt in $(seq 1 24); do
              if curl -fsS "http://127.0.0.1:8098/actuator/health" | grep -q '"status":"UP"'; then
                echo
                echo "ScopeVerdict health check passed on attempt $attempt."
                break
              fi

              echo "Health check not ready yet, attempt $attempt/24."
              sleep 5
            done

            if ! curl -fsS "http://127.0.0.1:8098/actuator/health" | grep -q '"status":"UP"'; then
              echo "ScopeVerdict health check failed after deploy."
              docker compose logs --tail=200 app
              exit 1
            fi

            if curl -fsSL -H "Host: scopeverdict.com" "http://127.0.0.1/" > /tmp/scopeverdict-public-check.html; then
              if ! grep -qi "My Safe Florida Home Verdict" /tmp/scopeverdict-public-check.html; then
                echo "Host-routed public check did not return ScopeVerdict content."
                echo "This usually means nginx or another reverse proxy is still pointing scopeverdict.com at a different app."
                sed -n '1,120p' /tmp/scopeverdict-public-check.html
                exit 1
              fi
              echo "Host-routed public check returned ScopeVerdict content."
            else
              echo "Skipped host-routed public check because http://127.0.0.1/ was not reachable on the OCI host."
            fi
