spring.application.name=MySafeFloridaHomeVerdict
server.shutdown=graceful
server.forward-headers-strategy=framework
spring.mvc.problemdetails.enabled=true

app.base-url=${APP_BASE_URL:}
app.site-name=My Safe Florida Home Verdict
app.storage.leads-path=${APP_STORAGE_LEADS_PATH:storage/leads/leads.csv}
app.storage.events-path=${APP_STORAGE_EVENTS_PATH:storage/leads/lead_events.csv}
app.storage.quote-prep-briefs-path=${APP_STORAGE_QUOTE_PREP_BRIEFS_PATH:storage/tools/opening_protection_quote_prep_briefs.csv}
app.admin.username=${APP_ADMIN_USERNAME:}
app.admin.password=${APP_ADMIN_PASSWORD:}

gg.jte.developmentMode=${GG_JTE_DEVELOPMENT_MODE:true}
gg.jte.usePrecompiledTemplates=${GG_JTE_USE_PRECOMPILED_TEMPLATES:false}
gg.jte.templateLocation=src/main/jte
gg.jte.templateSuffix=.jte

management.endpoints.web.exposure.include=health,info
